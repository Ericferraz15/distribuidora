server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas do React Router (F5, link direto) caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prefixos da Distribuidora API — mesmo papel do proxy do Vite em dev.
    # Alguns prefixos coincidem com rotas do SPA (/dashboard, /usuarios):
    # navegacao de browser pede text/html e recebe o index.html; chamadas
    # fetch/JSON seguem para o backend.
    location ~ ^/(auth|usuarios|turnos|caixa|transacoes|produtos|dashboard)(/|$) {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
