server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas do React Router (F5, link direto) caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Distribuidora API sob /api/ (o build do front usa VITE_API_URL=/api).
    # Prefixo dedicado elimina a ambiguidade com rotas do SPA (/usuarios,
    # /dashboard...) — antes decidiamos pelo header Accept, e navegadores de
    # celular que mandam text/html em chamadas fetch recebiam HTML no lugar
    # de JSON ("Unexpected token '<'").
    location /api/ {
        # Barra final: o prefixo /api sai antes de chegar no backend.
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
