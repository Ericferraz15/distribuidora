services:
  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: distribuidora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend (FastAPI)
  backend:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/distribuidora_db
    volumes:
      # Chave JWT auto-gerada pelo entrypoint na 1a subida e reaproveitada
      # depois — o sistema sobe sem .env e sem configuracao nenhuma.
      - chave_jwt:/segredo

  # Frontend (Nginx + Vite)
  frontend:
    build: ./frontend
    restart: always
    ports:
      # PAINEL_BIND vem do .env (o instalar.sh cuida disso):
      # 127.0.0.1 = so esta maquina; 0.0.0.0 = rede local toda (loja).
      - "${PAINEL_BIND:-127.0.0.1}:80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  chave_jwt:
