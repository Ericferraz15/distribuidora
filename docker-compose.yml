version: '3.8'

services:
  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: distribuidora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend (FastAPI)
  backend:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/distribuidora_db

  # Frontend (Nginx + Vite)
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
