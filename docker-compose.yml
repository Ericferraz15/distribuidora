services:
  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: distribuidora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend (FastAPI)
  backend:
    build: .
    restart: always
    depends_on:
      - db
    # O .env do host vale em tempo de execucao (chave JWT, admin, CORS...);
    # sem isso o backend usava a copia congelada na imagem no build.
    env_file:
      - .env
    # `environment` vence o env_file: o DATABASE_URL do .env (localhost, modo
    # dev) nao se aplica dentro do container, aqui o banco se chama `db`.
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/distribuidora_db

  # Frontend (Nginx + Vite)
  frontend:
    build: ./frontend
    restart: always
    ports:
      # PAINEL_BIND vem do .env (o instalar.sh cuida disso):
      # 127.0.0.1 = so esta maquina; 0.0.0.0 = rede local toda (loja).
      - "${PAINEL_BIND:-127.0.0.1}:80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
